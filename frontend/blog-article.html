<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Article | RoastMyDorm</title>
    <meta name="description" id="meta-description" content="">
    <meta name="robots" content="index, follow">

    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:type" content="article">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:image" id="og-image" content="">
    <meta property="article:published_time" id="og-published" content="">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" id="twitter-title" content="">
    <meta name="twitter:description" id="twitter-description" content="">

    <link rel="canonical" id="canonical-url" href="">
    <link rel="icon" type="image/x-icon" href="roastmydorm_logo-removebg-preview.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: #1f2937; background: #fff; }

        /* ── Header ── */
        .header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 800; text-decoration: none; background: linear-gradient(135deg, #00a8a8, #007a7a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: #4b5563; font-weight: 500; font-size: 0.95rem; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #00a8a8; }
        .nav-btn { background: #00a8a8; color: #fff !important; padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 700 !important; }
        .nav-btn:hover { background: #007a7a !important; }

        /* ── Layout ── */
        .page-wrap { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; }

        /* ── Breadcrumb ── */
        .breadcrumb { display: flex; gap: 8px; align-items: center; margin-bottom: 28px; color: #9ca3af; font-size: 0.85rem; flex-wrap: wrap; }
        .breadcrumb a { color: #6b7280; text-decoration: none; }
        .breadcrumb a:hover { color: #00a8a8; }
        .breadcrumb span.sep { color: #d1d5db; }

        /* ── Article header ── */
        .article-header { margin-bottom: 36px; }
        .article-category { font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #00a8a8; margin-bottom: 12px; }
        .article-title { font-family: 'Poppins', sans-serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #111827; line-height: 1.2; margin-bottom: 20px; }
        .article-meta { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; color: #6b7280; font-size: 0.875rem; }
        .article-meta i { color: #00a8a8; margin-right: 4px; }

        /* ── Hero image ── */
        .article-hero { width: 100%; border-radius: 16px; margin-bottom: 40px; overflow: hidden; }
        .article-hero-placeholder { height: 340px; display: flex; align-items: center; justify-content: center; font-size: 5rem; border-radius: 16px; margin-bottom: 40px; }
        .article-hero-placeholder.teal { background: linear-gradient(135deg, #e0f7f7, #b2ebeb); }

        /* ── TOC ── */
        .toc { background: #f9fafb; border-left: 4px solid #00a8a8; border-radius: 0 12px 12px 0; padding: 20px 24px; margin-bottom: 40px; }
        .toc-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #00a8a8; margin-bottom: 12px; }
        .toc ol { padding-left: 1.25rem; margin: 0; }
        .toc li { margin-bottom: 6px; }
        .toc a { color: #4b5563; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .toc a:hover { color: #00a8a8; }

        /* ── Body content ── */
        .article-body { font-size: 1.05rem; line-height: 1.85; color: #374151; }
        .article-body h2 { font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 700; color: #111827; margin: 44px 0 16px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb; }
        .article-body h3 { font-size: 1.15rem; font-weight: 700; color: #1f2937; margin: 28px 0 12px; }
        .article-body p { margin-bottom: 20px; }
        .article-body ul, .article-body ol { margin: 0 0 20px 1.5rem; }
        .article-body li { margin-bottom: 8px; }
        .article-body a { color: #00a8a8; text-decoration: underline; }
        .article-body a:hover { color: #007a7a; }
        .article-body blockquote { border-left: 4px solid #00a8a8; margin: 28px 0; padding: 12px 20px; background: #f0fdfc; border-radius: 0 8px 8px 0; font-style: italic; color: #4b5563; }
        .article-body img { max-width: 100%; border-radius: 12px; margin: 24px 0; }

        /* ── Tip / Warning boxes ── */
        .tip, .warn { border-radius: 10px; padding: 14px 18px; margin: 24px 0; font-size: 0.95rem; display: flex; gap: 10px; align-items: flex-start; }
        .tip { background: #f0fdfc; border: 1px solid #a7f3d0; color: #065f46; }
        .tip i { color: #10b981; margin-top: 2px; flex-shrink: 0; }
        .warn { background: #fff7ed; border: 1px solid #fed7aa; color: #92400e; }
        .warn i { color: #f97316; margin-top: 2px; flex-shrink: 0; }

        /* ── Share bar ── */
        .share-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 44px 0; padding: 20px 0; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; }
        .share-label { font-weight: 600; color: #374151; font-size: 0.9rem; margin-right: 4px; }
        .share-btn { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 0.85rem; border: none; cursor: pointer; transition: transform 0.2s, opacity 0.2s; }
        .share-btn:hover { transform: scale(1.1); opacity: 0.9; }
        .share-btn.facebook { background: #1877f2; }
        .share-btn.twitter  { background: #1da1f2; }
        .share-btn.whatsapp { background: #25d366; }
        .share-btn.copy     { background: #6b7280; }

        /* ── Related articles ── */
        .related { margin-top: 56px; }
        .related h2 { font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 700; color: #111827; margin-bottom: 24px; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }
        .related-card { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; transition: box-shadow 0.25s, transform 0.25s; display: flex; flex-direction: column; }
        .related-card:hover { box-shadow: 0 6px 24px rgba(0,168,168,0.1); transform: translateY(-3px); }
        .related-card-thumb { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .related-card-thumb.rabat     { background: linear-gradient(135deg, #e0f7f7, #b2ebeb); }
        .related-card-thumb.casa      { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
        .related-card-thumb.marrakech { background: linear-gradient(135deg, #fdf4ff, #e9d5ff); }
        .related-card-thumb.roommate  { background: linear-gradient(135deg, #ecfdf5, #a7f3d0); }
        .related-card-thumb.landlord  { background: linear-gradient(135deg, #eff6ff, #bfdbfe); }
        .related-card-body { padding: 14px; flex: 1; }
        .related-card-cat { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #00a8a8; margin-bottom: 4px; }
        .related-card-title { font-size: 0.9rem; font-weight: 600; color: #111827; line-height: 1.35; }

        /* ── CTA banner ── */
        .cta-banner { background: linear-gradient(135deg, #111827, #1f2937); border-radius: 16px; padding: 36px 32px; text-align: center; color: #fff; margin-top: 56px; }
        .cta-banner h2 { font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
        .cta-banner p { color: #9ca3af; margin-bottom: 20px; font-size: 0.95rem; }
        .cta-btn { display: inline-block; background: #00a8a8; color: #fff; text-decoration: none; padding: 0.75rem 1.75rem; border-radius: 10px; font-weight: 700; font-size: 0.95rem; transition: background 0.2s, transform 0.2s; }
        .cta-btn:hover { background: #007a7a; transform: translateY(-2px); }

        /* ── Footer ── */
        footer { background: #111827; color: #9ca3af; text-align: center; padding: 2rem; font-size: 0.875rem; margin-top: 80px; }
        footer a { color: #00a8a8; text-decoration: none; }

        /* ── Loading / error ── */
        .state-box { text-align: center; padding: 80px 20px; color: #6b7280; }
        .state-box i { font-size: 2.5rem; color: #d1d5db; display: block; margin-bottom: 12px; }
        .state-box h2 { font-size: 1.2rem; margin-bottom: 8px; color: #374151; }
        .state-box a { color: #00a8a8; text-decoration: none; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .header { padding: 1rem; }
            .nav-links a:not(.nav-btn) { display: none; }
            .page-wrap { padding: 32px 16px 60px; }
            .article-hero-placeholder { height: 220px; font-size: 3.5rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="index.html" class="logo">RoastMyDorm</a>
        <nav class="nav-links">
            <a href="rabat-dorms.html">Rabat</a>
            <a href="casablanca-dorms.html">Casablanca</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="for-landlords.html">Propriétaires</a>
            <a href="rabat-dorms.html" class="nav-btn">Voir les logements</a>
        </nav>
    </div>
</header>

<main class="page-wrap" id="article-container">
    <div class="state-box">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Chargement de l'article…</p>
    </div>
</main>

<footer>
    <p>© 2026 <a href="index.html">RoastMyDorm</a> · <a href="for-landlords.html">Publier une annonce</a> · <a href="blog.html">Blog</a></p>
</footer>

<script type="application/ld+json" id="article-schema"></script>

<script>
    const slug = new URLSearchParams(window.location.search).get('slug') ||
                 window.location.pathname.split('/').pop().replace('.html', '');

    async function loadArticle() {
        try {
            const res = await fetch(`/api/blog/${slug}`);
            const data = await res.json();
            if (!data.success) throw new Error('not found');
            renderArticle(data.data.post);
        } catch {
            showFallback();
        }
    }

    function renderArticle(post) {
        setMeta(post);
        const pageUrl = encodeURIComponent(`https://www.roastmydorm.com/blog-article.html?slug=${post.slug}`);
        const pageTitle = encodeURIComponent(post.title);

        document.getElementById('article-container').innerHTML = `
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="index.html">Accueil</a>
                <span class="sep">/</span>
                <a href="blog.html">Blog</a>
                <span class="sep">/</span>
                <span>${esc(post.category || '')}</span>
            </nav>

            <header class="article-header">
                <p class="article-category">${esc(post.category || '')}</p>
                <h1 class="article-title">${esc(post.title)}</h1>
                <div class="article-meta">
                    <span><i class="fas fa-calendar-alt"></i>${fmtDate(post.publishedAt)}</span>
                    ${post.readTime ? `<span><i class="fas fa-clock"></i>${post.readTime} min de lecture</span>` : ''}
                </div>
            </header>

            ${post.featuredImage
                ? `<img src="${post.featuredImage}" alt="${esc(post.title)}" class="article-hero">`
                : `<div class="article-hero-placeholder teal">📰</div>`}

            ${post.tableOfContents?.length ? `
            <nav class="toc">
                <div class="toc-title"><i class="fas fa-list"></i>&nbsp; Sommaire</div>
                <ol>${post.tableOfContents.map((t, i) => `<li><a href="#s${i}">${esc(t)}</a></li>`).join('')}</ol>
            </nav>` : ''}

            <div class="article-body">${post.content}</div>

            <div class="share-bar">
                <span class="share-label">Partager :</span>
                <a href="https://www.facebook.com/sharer/sharer.php?u=${pageUrl}" class="share-btn facebook" target="_blank" rel="noopener" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://twitter.com/intent/tweet?url=${pageUrl}&text=${pageTitle}" class="share-btn twitter" target="_blank" rel="noopener" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="https://wa.me/?text=${pageTitle}%20${pageUrl}" class="share-btn whatsapp" target="_blank" rel="noopener" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <button class="share-btn copy" onclick="copyLink()" aria-label="Copier le lien"><i class="fas fa-link"></i></button>
            </div>

            ${relatedHTML()}

            <div class="cta-banner">
                <h2>Prêt à trouver ton logement ?</h2>
                <p>Des centaines d'offres vérifiées à Rabat, Casablanca et Marrakech.</p>
                <a href="rabat-dorms.html" class="cta-btn"><i class="fas fa-search"></i>&nbsp; Parcourir les logements</a>
            </div>
        `;
    }

    function showFallback() {
        const post = {
            title: '10 choses à vérifier avant de signer un bail étudiant',
            category: 'Conseils Logement',
            publishedAt: new Date().toISOString(),
            readTime: 6,
            tableOfContents: [
                'Lire le bail en entier',
                'Tester tous les équipements',
                'Documenter les dommages existants',
                'Clarifier les charges',
                'Connaître vos droits'
            ],
            content: `
                <p>Trouver un logement étudiant au Maroc peut être stressant, mais signer un bail sans faire les vérifications nécessaires peut mener à de bien plus grandes complications. Voici 5 points essentiels à contrôler avant de vous engager.</p>

                <h2 id="s0">1. Lire le bail en entier</h2>
                <p>Le bail est un contrat juridiquement contraignant. Lisez chaque clause attentivement, notamment :</p>
                <ul>
                    <li>La durée du bail et les conditions de renouvellement</li>
                    <li>Les pénalités en cas de résiliation anticipée</li>
                    <li>Les règles concernant la sous-location</li>
                    <li>Les clauses de révision du loyer</li>
                </ul>
                <div class="tip"><i class="fas fa-lightbulb"></i><span>Demandez toujours une copie du bail avant de verser quoi que ce soit. Un propriétaire sérieux n'hésite pas à vous en remettre un.</span></div>

                <h2 id="s1">2. Tester tous les équipements</h2>
                <p>Avant de signer, vérifiez en personne que tout fonctionne : robinets, chauffe-eau, prises électriques, réfrigérateur, machine à laver si incluse. Les réparations sont à la charge du propriétaire, mais seulement si les problèmes sont documentés avant votre entrée dans les lieux.</p>

                <h2 id="s2">3. Documenter les dommages existants</h2>
                <p>Prenez des photos et des vidéos de l'intégralité du logement avant d'emménager. Notez :</p>
                <ul>
                    <li>Traces sur les murs ou le plafond</li>
                    <li>Rayures sur le sol</li>
                    <li>Équipements cassés ou défectueux</li>
                    <li>Moisissures ou infiltrations d'eau</li>
                </ul>
                <p>Envoyez ces éléments par écrit au propriétaire et gardez en copies. Cela protège votre caution à la fin du bail.</p>
                <div class="warn"><i class="fas fa-exclamation-triangle"></i><span>Un propriétaire peut retenir une partie ou la totalité de la caution si des dommages non documentés sont constatés à votre départ.</span></div>

                <h2 id="s3">4. Clarifier les charges</h2>
                <p>Clarifiez exactement ce qui est inclus dans le loyer. Renseignez-vous sur :</p>
                <ul>
                    <li>L'eau et l'électricité (compteurs individuels ou partagés ?)</li>
                    <li>Internet et télévision</li>
                    <li>Le chauffage et la climatisation</li>
                    <li>Le ramassage des ordures</li>
                </ul>
                <blockquote>« La plus grosse erreur des étudiants, c'est de ne pas demander le détail des charges. Les factures surprises en fin de mois peuvent vraiment déséquilibrer un budget. »</blockquote>

                <h2 id="s4">5. Connaître vos droits</h2>
                <p>En tant que locataire au Maroc, vous bénéficiez de protections légales. Un propriétaire ne peut pas :</p>
                <ul>
                    <li>Entrer dans le logement sans préavis</li>
                    <li>Retenir la caution sans justification écrite</li>
                    <li>Augmenter le loyer sans accord mutuel en cours de bail</li>
                    <li>Vous expulser sans procédure légale</li>
                </ul>

                <p>Vous avez des questions sur le logement étudiant ? Consultez nos <a href="blog.html">autres guides</a> ou <a href="find-roommate-matches.html">trouvez un colocataire</a> pour partager les frais.</p>
            `
        };
        renderArticle(post);
    }

    function relatedHTML() {
        const articles = [
            { href: 'guide-logement-rabat.html',      thumb: 'rabat',     emoji: '🏙️', cat: 'Guide ville · Rabat',      title: 'Guide Logement Étudiant à Rabat 2026' },
            { href: 'guide-logement-casablanca.html',  thumb: 'casa',      emoji: '🌆', cat: 'Guide ville · Casablanca',  title: 'Guide Logement Étudiant à Casablanca 2026' },
            { href: 'guide-logement-marrakech.html',   thumb: 'marrakech', emoji: '🌴', cat: 'Guide ville · Marrakech',   title: 'Guide Logement Étudiant à Marrakech 2026' },
            { href: 'find-roommate-matches.html',       thumb: 'roommate',  emoji: '🤝', cat: 'Astuce · Colocation',       title: 'Trouver la Colocation Idéale au Maroc' },
            { href: 'for-landlords.html',               thumb: 'landlord',  emoji: '🏠', cat: 'Guide · Propriétaires',     title: 'Publier une Annonce Logement Étudiant' },
        ];
        return `
            <section class="related">
                <h2>Autres guides</h2>
                <div class="related-grid">
                    ${articles.map(a => `
                        <a href="${a.href}" class="related-card">
                            <div class="related-card-thumb ${a.thumb}">${a.emoji}</div>
                            <div class="related-card-body">
                                <p class="related-card-cat">${a.cat}</p>
                                <p class="related-card-title">${a.title}</p>
                            </div>
                        </a>
                    `).join('')}
                </div>
            </section>
        `;
    }

    function setMeta(post) {
        document.getElementById('page-title').textContent = `${post.title} | RoastMyDorm`;
        document.getElementById('meta-description').content = post.excerpt || post.title;
        document.getElementById('og-title').content = post.title;
        document.getElementById('og-description').content = post.excerpt || post.title;
        document.getElementById('twitter-title').content = post.title;
        document.getElementById('twitter-description').content = post.excerpt || post.title;
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            alert('Lien copié !');
        });
    }

    function fmtDate(d) {
        return new Date(d).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadArticle);
</script>
</body>
</html>
